name: Build NAStool Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - .github/workflows/build.yml
      - app/**
      - build_sites.py
      - check_config.py
      - config.py
      - config/**
      - db_scripts/**
      - dbscript_gen.py
      - docker/**
      - log.py
      - package_list.txt
      - requirements.txt
      - run.py
      - third_party.txt
      - third_party/**
      - version.py
      - web/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Release version
        run: |
          app_version=$(sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp" version.py)
          echo "app_version=${app_version:-custom}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.app_version }}
