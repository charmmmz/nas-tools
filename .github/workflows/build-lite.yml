name: Build NAStool Lite Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - v2.9.1-e3a43d4
    paths:
      - version.py
      - requirements.txt
      - third_party.txt
      - docker/Dockerfile.lite
      - docker/entrypoint.sh
      - .dockerignore
      - .github/workflows/build-lite.yml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Lite Image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Release version
        run: |
          app_version=$(sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp" version.py)
          echo "app_version=${app_version:-custom}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push lite image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.lite
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lite
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.app_version }}-lite
