name: Build NASTOOL Image

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Build target platforms
        required: true
        default: amd64
        type: choice
        options:
          - amd64
          - arm64
          - multi
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - .forgejo/workflows/build.yml
      - app/**
      - build_sites.py
      - check_config.py
      - config.py
      - config/**
      - db_scripts/**
      - dbscript_gen.py
      - docker/**
      - log.py
      - package_list.txt
      - requirements.txt
      - run.py
      - third_party.txt
      - third_party/**
      - version.py
      - web/**

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY_OVERRIDE: ${{ vars.REGISTRY }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Resolve registry
        run: |
          registry="${REGISTRY_OVERRIDE}"
          if [ -z "$registry" ]; then
            registry="${GITHUB_SERVER_URL#http://}"
            registry="${registry#https://}"
          fi
          registry="${registry%%/}"
          image_name=$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=${registry}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"

      - name: Release version
        run: |
          app_version=$(sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp" version.py)
          echo "app_version=${app_version:-custom}" >> "$GITHUB_ENV"

      - name: Resolve platforms
        env:
          PLATFORM_INPUT: ${{ inputs.platforms }}
        run: |
          case "${PLATFORM_INPUT:-amd64}" in
            amd64)
              platforms="linux/amd64"
              ;;
            arm64)
              platforms="linux/arm64"
              ;;
            multi)
              platforms="linux/amd64,linux/arm64"
              ;;
            *)
              echo "Unsupported platforms input: ${PLATFORM_INPUT}" >&2
              exit 1
              ;;
          esac
          echo "Resolved platforms: ${platforms}"
          echo "PLATFORMS=${platforms}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: ${{ inputs.platforms == 'arm64' || inputs.platforms == 'multi' }}
        uses: https://github.com/docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Resolve Buildx proxy
        id: buildx-proxy
        run: |
          proxy="${HTTPS_PROXY:-${https_proxy:-${HTTP_PROXY:-${http_proxy:-}}}}"
          no_proxy="${NO_PROXY:-${no_proxy:-}}"
          echo "proxy=${proxy}" >> "$GITHUB_OUTPUT"
          echo "no_proxy=${no_proxy}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: https://github.com/docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          driver-opts: |
            image=moby/buildkit:v0.13.2
            network=host
            env.HTTP_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            env.HTTPS_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            env.http_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            env.https_proxy=${{ steps.buildx-proxy.outputs.proxy }}

      - name: Login to Forgejo registry
        uses: https://github.com/docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build and push image
        uses: https://github.com/docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            HTTP_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            HTTPS_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            http_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            https_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            NO_PROXY=${{ steps.buildx-proxy.outputs.no_proxy }}
            no_proxy=${{ steps.buildx-proxy.outputs.no_proxy }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.app_version }}
