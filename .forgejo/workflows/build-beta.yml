name: Build NASTOOL Beta Image

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - version.py
      - package_list.txt
      - requirements.txt
      - third_party.txt
      - docker/Dockerfile.beta
      - docker/entrypoint.sh
      - .dockerignore
      - .forgejo/workflows/build-beta.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY_OVERRIDE: ${{ vars.REGISTRY }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Beta Image
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Resolve registry
        run: |
          registry="${REGISTRY_OVERRIDE}"
          if [ -z "$registry" ]; then
            registry="${GITHUB_SERVER_URL#http://}"
            registry="${registry#https://}"
          fi
          registry="${registry%%/}"
          image_name=$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=${registry}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"

      - name: Release version
        run: |
          app_version=$(sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp" version.py)
          echo "app_version=${app_version:-custom}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: https://github.com/docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Resolve Buildx proxy
        id: buildx-proxy
        run: |
          proxy="${HTTPS_PROXY:-${https_proxy:-${HTTP_PROXY:-${http_proxy:-}}}}"
          no_proxy="${NO_PROXY:-${no_proxy:-}}"
          echo "proxy=${proxy}" >> "$GITHUB_OUTPUT"
          echo "no_proxy=${no_proxy}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: https://github.com/docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          driver-opts: |
            network=host
            env.HTTP_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            env.HTTPS_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            env.http_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            env.https_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            env.NO_PROXY=${{ steps.buildx-proxy.outputs.no_proxy }}
            env.no_proxy=${{ steps.buildx-proxy.outputs.no_proxy }}

      - name: Login to Forgejo registry
        uses: https://github.com/docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Build and push beta image
        uses: https://github.com/docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile.beta
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          build-args: |
            HTTP_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            HTTPS_PROXY=${{ steps.buildx-proxy.outputs.proxy }}
            http_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            https_proxy=${{ steps.buildx-proxy.outputs.proxy }}
            NO_PROXY=${{ steps.buildx-proxy.outputs.no_proxy }}
            no_proxy=${{ steps.buildx-proxy.outputs.no_proxy }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:beta
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.app_version }}-beta
