name: Forgejo Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show context
        run: |
          pwd
          git status --short
          echo "server=$GITHUB_SERVER_URL"
          echo "repository=$GITHUB_REPOSITORY"
          echo "runner smoke OK"
