name: Forgejo Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Show context
        run: |
          pwd
          git status --short
          echo "server=$GITHUB_SERVER_URL"
          echo "repository=$GITHUB_REPOSITORY"
          echo "runner smoke OK"
