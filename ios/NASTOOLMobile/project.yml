name: NASTOOLMobile
options:
  bundleIdPrefix: com.charm.nastool
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    DEVELOPMENT_TEAM: ""
targets:
  NASTOOLMobile:
    type: application
    platform: iOS
    sources:
      - path: NASTOOLMobileApp
      - path: NASTOOLMobileShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charm.nastool.mobile
        INFOPLIST_KEY_CFBundleDisplayName: NASTOOL
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: NASTOOLMobileApp/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
  NASTOOLMobileWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: NASTOOLMobileWidgets
      - path: NASTOOLMobileShared
    dependencies:
      - target: NASTOOLMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charm.nastool.mobile.widgets
        INFOPLIST_KEY_CFBundleDisplayName: NASTOOL Widgets
        INFOPLIST_KEY_NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    info:
      path: NASTOOLMobileWidgets/Info.plist
  NASTOOLMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NASTOOLMobileTests
    dependencies:
      - target: NASTOOLMobile
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  NASTOOLMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NASTOOLMobileUITests
    dependencies:
      - target: NASTOOLMobile
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  NASTOOLMobile:
    build:
      targets:
        NASTOOLMobile: all
        NASTOOLMobileWidgets: all
    test:
      gatherCoverageData: true
      targets:
        - NASTOOLMobileTests
        - NASTOOLMobileUITests
